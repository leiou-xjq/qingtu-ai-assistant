<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青途智伴 - 大学生AI生活助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
    .app { max-width: 480px; margin: 0 auto; background: #fff; min-height: 100vh; }
    .header { background: #3B82F6; color: #fff; padding: 20px; text-align: center; }
    .nav { display: flex; background: #fff; border-top: 1px solid #eee; position: fixed; bottom: 0; width: 100%; max-width: 480px; }
    .nav-item { flex: 1; text-align: center; padding: 10px; color: #666; font-size: 12px; cursor: pointer; }
    .nav-item.active { color: #3B82F6; }
    .page { padding: 20px; padding-bottom: 70px; }
    .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .btn { background: #3B82F6; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; width: 100%; font-size: 16px; cursor: pointer; }
    .btn:active { opacity: 0.8; }
    .input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
    .weather { display: flex; align-items: center; gap: 12px; }
    .weather-icon { font-size: 40px; }
    .weather-temp { font-size: 32px; font-weight: 600; }
    .weather-desc { color: #666; }
    .feature-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .feature-item { text-align: center; }
    .feature-icon { width: 48px; height: 48px; background: #EEF2FF; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; font-size: 24px; }
    .feature-name { font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="header">
      <h1>青途智伴</h1>
      <p>大学生AI生活助手</p>
    </div>
    
    <div class="page" v-if="page === 'home'">
      <div class="card">
        <div class="weather">
          <span class="weather-icon">☀️</span>
          <div>
            <div class="weather-temp">24°C</div>
            <div class="weather-desc">晴转多云</div>
          </div>
        </div>
      </div>
      
      <div class="card">
        <div class="card-title">快捷功能</div>
        <div class="feature-grid">
          <div class="feature-item" @click="page = 'weather'">
            <div class="feature-icon">🌤️</div>
            <div class="feature-name">天气</div>
          </div>
          <div class="feature-item" @click="page = 'cost'">
            <div class="feature-icon">💰</div>
            <div class="feature-name">记账</div>
          </div>
          <div class="feature-item" @click="page = 'course'">
            <div class="feature-icon">📚</div>
            <div class="feature-name">课程</div>
          </div>
          <div class="feature-item" @click="page = 'diet'">
            <div class="feature-icon">🍱</div>
            <div class="feature-name">饮食</div>
          </div>
        </div>
      </div>
      
      <div class="card">
        <div class="card-title">智能问答</div>
        <textarea class="input" v-model="question" placeholder="问我任何问题..." rows="3"></textarea>
        <button class="btn" @click="askAI">提问</button>
        <div v-if="answer" style="margin-top: 12px; padding: 12px; background: #f9f9f9; border-radius: 8px;">
          {{ answer }}
        </div>
      </div>
    </div>
    
    <div class="page" v-if="page === 'weather'">
      <div class="card">
        <div class="card-title">天气穿搭</div>
        <p>今日天气：晴转多云 24°C</p>
        <p>穿衣建议：建议穿薄外套</p>
      </div>
    </div>
    
    <div class="page" v-if="page === 'cost'">
      <div class="card">
        <div class="card-title">智能记账</div>
        <input class="input" v-model="costAmount" type="number" placeholder="金额">
        <input class="input" v-model="costDesc" placeholder="描述">
        <button class="btn" @click="addCost">记账</button>
      </div>
    </div>
    
    <div class="page" v-if="page === 'course'">
      <div class="card">
        <div class="card-title">今日课程</div>
        <p>暂无课程安排</p>
      </div>
    </div>
    
    <div class="page" v-if="page === 'chat'">
      <div class="card">
        <div class="card-title">AI问答</div>
        <textarea class="input" v-model="question" placeholder="问我任何问题..." rows="4"></textarea>
        <button class="btn" @click="askAI">发送</button>
        <div v-if="answer" style="margin-top: 12px;">
          <div style="font-weight: 600; margin-bottom: 8px;">AI回答：</div>
          <div style="padding: 12px; background: #f9f9f9; border-radius: 8px;">{{ answer }}</div>
        </div>
      </div>
    </div>
    
    <div class="page" v-if="page === 'profile'">
      <div class="card">
        <div class="card-title">个人中心</div>
        <p>登录后可查看更多信息</p>
      </div>
    </div>
    
    <div class="nav">
      <div class="nav-item" :class="{active: page==='home'}" @click="page='home'">首页</div>
      <div class="nav-item" :class="{active: page==='weather'}" @click="page='weather'">天气</div>
      <div class="nav-item" :class="{active: page==='cost'}" @click="page='cost'">记账</div>
      <div class="nav-item" :class="{active: page==='course'}" @click="page='course'">课程</div>
      <div class="nav-item" :class="{active: page==='chat'}" @click="page='chat'">问答</div>
      <div class="nav-item" :class="{active: page==='profile'}" @click="page='profile'">我的</div>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script>
    const { createApp, ref } = Vue
    
    createApp({
      setup() {
        const page = ref('home')
        const question = ref('')
        const answer = ref('')
        const costAmount = ref('')
        const costDesc = ref('')
        
        const askAI = async () => {
          if (!question.value) return
          answer.value = '加载中...'
          try {
            const res = await fetch('http://localhost:8080/api/rag/ask', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({question: question.value})
            })
            const data = await res.json()
            answer.value = data.data?.answer || 'AI服务暂不可用'
          } catch (e) {
            answer.value = '后端服务未启动，请先启动后端'
          }
        }
        
        const addCost = async () => {
          if (!costAmount.value) return
          try {
            const res = await fetch('http://localhost:8080/api/cost/add', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({amount: costAmount.value, category: 'other', remark: costDesc.value})
            })
            alert('记账成功')
            costAmount.value = ''
            costDesc.value = ''
          } catch (e) {
            alert('后端服务未启动')
          }
        }
        
        return { page, question, answer, costAmount, costDesc, askAI, addCost }
      }
    }).mount('#app')
  </script>
</body>
</html>
